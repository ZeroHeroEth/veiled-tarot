<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Veiled — Celestial Tarot</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Cinzel+Decorative:wght@400&family=Josefin+Sans:wght@300;400;600&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #04080f;
    --bg2: #070d18;
    --bg3: #0a1220;
    --bg4: #0d1729;
    --gold: #c8a84b;
    --gold-dim: #8a6e2a;
    --gold-pale: #e8d49a;
    --gold-glow: rgba(200,168,75,0.15);
    --navy: #0d1f35;
    --navy2: #122843;
    --steel: #1e3a5a;
    --mist: #2a4a6e;
    --text: #c8b98a;
    --text-dim: #6a7a8a;
    --text-faint: #2a3d52;
    --border: rgba(200,168,75,0.12);
    --border-bright: rgba(200,168,75,0.35);
    --card-w: 80px;
    --card-h: 136px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Josefin Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    cursor: default;
  }

  /* Star field */
  #starfield {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }

  .star-dot {
    position: absolute;
    border-radius: 50%;
    background: #c8b98a;
    animation: twinkle var(--dur) ease-in-out infinite var(--delay);
  }

  @keyframes twinkle {
    0%,100% { opacity: var(--base-op); transform: scale(1); }
    50% { opacity: calc(var(--base-op) * 2.5); transform: scale(1.4); }
  }

  /* Layout */
  .app {
    position: relative;
    z-index: 1;
    max-width: 820px;
    margin: 0 auto;
    padding: 0 20px 60px;
    min-height: 100vh;
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 28px 0 24px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 0;
  }

  .logo-area {
    display: flex;
    align-items: baseline;
    gap: 16px;
  }

  .logo {
    font-family: 'Cinzel', serif;
    font-size: 26px;
    font-weight: 600;
    color: var(--gold);
    letter-spacing: 8px;
    text-transform: uppercase;
  }

  .logo-tagline {
    font-size: 9px;
    letter-spacing: 4px;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  nav {
    display: flex;
    gap: 4px;
  }

  .nav-btn {
    padding: 7px 18px;
    font-family: 'Josefin Sans', sans-serif;
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-dim);
    background: transparent;
    border: 1px solid transparent;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .nav-btn:hover { color: var(--text); border-color: var(--border); }
  .nav-btn.active { color: var(--gold); border-color: var(--border-bright); background: var(--gold-glow); }

  /* Views */
  .view { display: none; animation: fadeIn 0.4s ease; }
  .view.active { display: block; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  /* ===== READING VIEW ===== */
  .reading-intro {
    text-align: center;
    padding: 50px 0 40px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 40px;
  }

  .reading-intro h1 {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    letter-spacing: 6px;
    color: var(--gold-dim);
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .divider-line {
    display: flex;
    align-items: center;
    gap: 12px;
    justify-content: center;
    margin: 16px 0;
    color: var(--gold-dim);
    font-size: 10px;
    letter-spacing: 4px;
  }

  .divider-line::before, .divider-line::after {
    content: '';
    width: 80px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-dim));
  }

  .divider-line::after { background: linear-gradient(90deg, var(--gold-dim), transparent); }

  .question-box {
    max-width: 500px;
    margin: 0 auto 28px;
    position: relative;
  }

  .question-input {
    width: 100%;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 8px 18px;
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 14px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
    letter-spacing: 0.5px;
    text-align: center;
  }

  .question-input::placeholder { color: var(--text-faint); }
  .question-input:focus { border-color: var(--border-bright); }

  /* Spread selector */
  .spread-selector {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-bottom: 32px;
    flex-wrap: wrap;
  }

  .spread-opt {
    padding: 8px 20px;
    border: 1px solid var(--border);
    border-radius: 2px;
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.2s;
    background: transparent;
  }

  .spread-opt:hover { color: var(--text); border-color: rgba(200,168,75,0.25); }
  .spread-opt.active { color: var(--gold); border-color: var(--border-bright); background: var(--gold-glow); }

  /* Card table */
  .card-table {
    display: flex;
    justify-content: center;
    align-items: flex-end;
    gap: 14px;
    flex-wrap: wrap;
    min-height: 160px;
    margin-bottom: 32px;
    padding: 20px 0;
  }

  .card-slot {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .card-pos-label {
    font-size: 8px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-faint);
    text-align: center;
    line-height: 1.4;
    max-width: 90px;
  }

  .tarot-card {
    width: var(--card-w);
    height: var(--card-h);
    border-radius: 4px;
    background: #09090b;
    border: 1px solid #2a2a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.35s;
    position: relative;
    overflow: hidden;
    transform-style: preserve-3d;
  }

  .tarot-card::before {
    content: '';
    position: absolute;
    inset: 5px;
    border: 1px solid rgba(200,168,75,0.08);
    border-radius: 2px;
    pointer-events: none;
  }

  .tarot-card.face-down {
    background: var(--navy);
    border-color: var(--navy2);
  }

  .tarot-card.face-down::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      repeating-linear-gradient(45deg, rgba(200,168,75,0.04) 0px, rgba(200,168,75,0.04) 1px, transparent 1px, transparent 8px),
      repeating-linear-gradient(-45deg, rgba(200,168,75,0.04) 0px, rgba(200,168,75,0.04) 1px, transparent 1px, transparent 8px);
  }

  .tarot-card.revealed {
    border-color: var(--gold-dim);
    background: #09090b;
    box-shadow: 0 0 30px rgba(200,168,75,0.1), 0 8px 32px rgba(0,0,0,0.6);
  }

  .tarot-card.revealed.major-revealed {
    background: #05080f;
    border-color: var(--gold);
    box-shadow: 0 0 30px rgba(200,168,75,0.18), 0 8px 32px rgba(0,0,0,0.8);
  }

  .tarot-card.center-card {
    width: calc(var(--card-w) * 1.1);
    height: calc(var(--card-h) * 1.1);
    border-color: var(--gold);
  }

  .tarot-card:hover:not(.face-down) {
    transform: translateY(-4px);
    box-shadow: 0 12px 40px rgba(200,168,75,0.15);
  }

  .card-inner {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 8px;
    text-align: center;
  }

  .card-glyph { font-size: 28px; line-height: 1; }
  .card-numeral {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    color: var(--gold-dim);
    letter-spacing: 2px;
  }

  .card-name {
    font-family: 'Cinzel', serif;
    font-size: 8px;
    color: var(--text);
    letter-spacing: 1px;
    line-height: 1.4;
    text-align: center;
  }

  /* ── Minor Arcana: double border + corner gems ── */
  .card-minor-inner {
    position: absolute;
    inset: 5px;
    border: 1px solid rgba(200,168,75,0.18);
    border-radius: 2px;
    pointer-events: none;
  }
  .card-corner-gem {
    position: absolute;
    width: 6px; height: 6px;
    background: var(--gold-dim);
    transform: rotate(45deg);
    pointer-events: none;
  }
  .card-corner-gem.tl { top: 7px; left: 7px; }
  .card-corner-gem.tr { top: 7px; right: 7px; }
  .card-corner-gem.bl { bottom: 7px; left: 7px; }
  .card-corner-gem.br { bottom: 7px; right: 7px; }

  /* Suit corner tints on drawn reading cards */
  .suit-tint {
    position: absolute;
    inset: 0;
    pointer-events: none;
    border-radius: 4px;
    z-index: 1;
  }
  .suit-tint.wands { background: radial-gradient(ellipse at 0% 100%, rgba(180,80,20,0.28) 0%, transparent 60%), radial-gradient(ellipse at 100% 0%, rgba(180,80,20,0.20) 0%, transparent 60%); }
  .suit-tint.cups { background: radial-gradient(ellipse at 0% 100%, rgba(20,80,160,0.28) 0%, transparent 60%), radial-gradient(ellipse at 100% 0%, rgba(20,80,160,0.20) 0%, transparent 60%); }
  .suit-tint.swords { background: radial-gradient(ellipse at 0% 100%, rgba(140,155,175,0.28) 0%, transparent 60%), radial-gradient(ellipse at 100% 0%, rgba(140,155,175,0.20) 0%, transparent 60%); }
  .suit-tint.pentacles { background: radial-gradient(ellipse at 0% 100%, rgba(30,110,50,0.28) 0%, transparent 60%), radial-gradient(ellipse at 100% 0%, rgba(30,110,50,0.20) 0%, transparent 60%); }

  /* ── Major Arcana: star field + aura + nameplate ── */
  .card-major-stars {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }
  .card-aura {
    position: absolute;
    border-radius: 50%;
    border: 1px solid rgba(200,168,75,0.12);
    pointer-events: none;
    top: calc(50% - 18px);
    left: 50%;
    transform: translate(-50%, -50%);
  }
  .card-major-corner {
    position: absolute;
    width: 14px; height: 14px;
    pointer-events: none;
  }
  .card-major-corner.tl { top: 6px; left: 6px; border-top: 1px solid var(--gold); border-left: 1px solid var(--gold); }
  .card-major-corner.tr { top: 6px; right: 6px; border-top: 1px solid var(--gold); border-right: 1px solid var(--gold); }
  .card-major-corner.bl { bottom: 38px; left: 6px; border-bottom: 1px solid var(--gold); border-left: 1px solid var(--gold); }
  .card-major-corner.br { bottom: 38px; right: 6px; border-bottom: 1px solid var(--gold); border-right: 1px solid var(--gold); }
  .card-major-plate {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    min-height: 36px;
    background: rgba(4,6,12,0.96);
    border-top: 1px solid rgba(200,168,75,0.5);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1px;
    padding: 3px 4px;
    pointer-events: none;
  }
  .card-major-plate .plate-num {
    font-family: 'Cinzel', serif;
    font-size: 8px;
    color: var(--gold);
    letter-spacing: 3px;
  }
  .card-major-plate .plate-name {
    font-family: 'Cinzel', serif;
    font-size: 7px;
    color: var(--gold-pale);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    text-align: center;
    line-height: 1.3;
    padding: 0 4px;
    width: 100%;
  }
  .card-major-inner {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    padding-bottom: 36px;
    height: 100%;
    gap: 0;
  }

  .card-face-down-glyph {
    font-size: 22px;
    opacity: 0.15;
  }

  .reversed-badge {
    position: absolute;
    top: 6px;
    right: 6px;
    font-size: 7px;
    letter-spacing: 1px;
    color: var(--gold-dim);
    writing-mode: vertical-rl;
    text-transform: uppercase;
    opacity: 0.6;
  }

  /* Draw button */
  .draw-area { text-align: center; margin-bottom: 32px; }

  .draw-btn {
    padding: 13px 48px;
    border: 1px solid var(--border-bright);
    border-radius: 2px;
    background: var(--gold-glow);
    color: var(--gold);
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.25s;
  }

  .draw-btn:hover { background: rgba(200,168,75,0.2); box-shadow: 0 0 30px rgba(200,168,75,0.1); }
  .draw-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Reading output */
  .reading-output {
    display: none;
    animation: fadeIn 0.6s ease;
    border-top: 1px solid var(--border);
    padding-top: 36px;
    margin-top: 20px;
  }

  .reading-output.visible { display: block; }

  .reading-header {
    text-align: center;
    margin-bottom: 32px;
  }

  .reading-header h2 {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 5px;
    color: var(--gold-dim);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .reading-card-summaries {
    display: flex;
    gap: 16px;
    margin-bottom: 32px;
    flex-wrap: wrap;
  }

  .card-summary {
    flex: 1;
    min-width: 160px;
    padding: 16px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 3px;
  }

  .card-summary-name {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--gold);
    margin-bottom: 4px;
    text-transform: uppercase;
  }

  .card-summary-pos {
    font-size: 8px;
    letter-spacing: 3px;
    color: var(--text-faint);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .card-summary-text {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.7;
  }

  .reading-narrative {
    padding: 28px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 3px;
    border-left: 2px solid var(--gold-dim);
    margin-bottom: 24px;
  }

  .reading-narrative h3 {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 4px;
    color: var(--gold-dim);
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .narrative-text { color: var(--text); }

  .narrative-summary {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 17px;
    color: var(--gold-pale);
    line-height: 1.7;
    margin-bottom: 20px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }

  .narrative-body p {
    font-family: 'Josefin Sans', sans-serif;
    font-style: normal;
    font-size: 13px;
    font-weight: 300;
    color: var(--text-dim);
    line-height: 1.9;
    letter-spacing: 0.3px;
    margin-bottom: 14px;
  }

  .narrative-body p:last-child { margin-bottom: 0; }

  .loading-indicator {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 20px;
    justify-content: center;
    color: var(--text-dim);
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .loading-dots span {
    display: inline-block;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--gold-dim);
    margin: 0 2px;
    animation: dot-pulse 1.4s ease-in-out infinite;
  }

  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes dot-pulse {
    0%,80%,100% { transform: scale(0.6); opacity: 0.4; }
    40% { transform: scale(1); opacity: 1; }
  }

  .new-reading-btn {
    padding: 10px 30px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-family: 'Josefin Sans', sans-serif;
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    border-radius: 2px;
    margin: 0 auto;
    display: block;
  }

  .new-reading-btn:hover { color: var(--text); border-color: rgba(200,168,75,0.25); }

  /* ===== CARDS VIEW ===== */
  .cards-view-header {
    padding: 40px 0 28px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    margin-bottom: 28px;
  }

  .cards-view-header h2 {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    letter-spacing: 5px;
    color: var(--gold-dim);
    text-transform: uppercase;
  }

  .card-filter {
    display: flex;
    gap: 6px;
  }

  .filter-btn {
    padding: 6px 14px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-faint);
    font-size: 8px;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
  }

  .filter-btn.active { color: var(--gold); border-color: var(--border-bright); background: var(--gold-glow); }
  .filter-btn:hover { color: var(--text-dim); }

  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
    gap: 20px;
  }

  .card-library-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    transition: all 0.25s;
    padding: 10px 6px;
    border-radius: 6px;
    border: 1px solid transparent;
  }

  .card-library-item:hover {
    border-color: transparent;
    background: rgba(200,168,75,0.06);
    box-shadow: 0 0 22px rgba(200,168,75,0.1), inset 0 0 18px rgba(200,168,75,0.04);
  }

  .gallery-card {
    width: 90px;
    height: 153px;
    border-radius: 4px;
    background: var(--bg3);
    border: 1px solid var(--steel);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    transition: all 0.25s;
  }

  .card-library-item:hover .gallery-card {
    transform: translateY(-4px);
    box-shadow: 0 12px 36px rgba(200,168,75,0.18);
  }

  .gallery-card.gallery-major {
    background: #05080f;
    border-color: var(--gold);
    box-shadow: 0 0 20px rgba(200,168,75,0.1);
  }

  .gallery-card.gallery-minor {
    background: #09090b;
    border-color: #2a2a2e;
  }


  .gallery-card-name {
    font-family: 'Cinzel', serif;
    font-size: 8px;
    color: var(--text-dim);
    text-align: center;
    letter-spacing: 0.5px;
    line-height: 1.3;
    max-width: 100px;
  }

  /* Card detail modal */
  .card-modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(4,8,15,0.92);
    z-index: 100;
    align-items: center;
    justify-content: center;
    animation: fadeIn 0.3s ease;
    padding: 20px;
  }

  .card-modal-overlay.open { display: flex; }

  .card-modal {
    max-width: 560px;
    width: 100%;
    background: var(--bg2);
    border: 1px solid var(--border-bright);
    border-radius: 4px;
    padding: 36px;
    position: relative;
    max-height: 85vh;
    overflow-y: auto;
  }

  .modal-close {
    position: absolute;
    top: 16px; right: 20px;
    background: none;
    border: none;
    color: var(--text-faint);
    font-size: 18px;
    cursor: pointer;
    transition: color 0.2s;
    font-family: 'Josefin Sans', sans-serif;
    line-height: 1;
  }

  .modal-close:hover { color: var(--gold); }

  .modal-card-top {
    display: flex;
    gap: 24px;
    margin-bottom: 28px;
    align-items: flex-start;
  }

  .modal-card-visual {
    width: 90px;
    height: 150px;
    flex-shrink: 0;
    background: var(--bg3);
    border: 1px solid var(--gold-dim);
    border-radius: 4px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    position: relative;
  }

  .modal-card-visual::before {
    content: '';
    position: absolute;
    inset: 5px;
    border: 1px solid rgba(200,168,75,0.12);
    border-radius: 2px;
  }

  .modal-glyph { font-size: 36px; }
  .modal-numeral { font-family: 'Cinzel', serif; font-size: 11px; color: var(--gold-dim); letter-spacing: 2px; }

  .modal-meta h2 {
    font-family: 'Cinzel', serif;
    font-size: 18px;
    color: var(--gold);
    letter-spacing: 3px;

const SPREADS = {
  single: { positions: ['Your Card'], count: 1 },
  three: { positions: ['Past', 'Present', 'Future'], count: 3 },
  horseshoe: { positions: ['Past Influences', 'Present Situation', 'Hidden Influences', 'Best Approach', 'External Forces', 'Hopes & Fears', 'Outcome'], count: 7 },
  celtic: { positions: ['Present', 'Challenge', 'Distant Past', 'Recent Past', 'Best Outcome', 'Near Future', 'Your Power', 'External Forces', 'Hopes & Fears', 'Final Outcome'], count: 10 },
};

// ===== STATE =====
let currentSpread = 'single';
let drawnCards = [];
let currentFilter = 'all';

// ===== STAR FIELD =====
function initStars() {
  const canvas = document.getElementById('starfield');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const stars = [];
  for (let i = 0; i < 180; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.2 + 0.3,
      baseOp: Math.random() * 0.35 + 0.05,
      phase: Math.random() * Math.PI * 2,
      speed: Math.random() * 0.008 + 0.003
    });
  }

  function draw(t) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(s => {
      const op = s.baseOp + Math.sin(t * s.speed + s.phase) * s.baseOp * 0.6;
      ctx.globalAlpha = Math.max(0, Math.min(1, op));
      ctx.fillStyle = '#c8b98a';
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);

  window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  });
}

// ===== VIEW MANAGEMENT =====
function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');

}

// ===== READING =====
function selectSpread(el, spread) {
  document.querySelectorAll('.spread-opt').forEach(o => o.classList.remove('active'));
  el.classList.add('active');
  currentSpread = spread;
  resetReading();
  renderCardTable();
}

function renderCardTable() {
  const table = document.getElementById('card-table');
  const spread = SPREADS[currentSpread];
  table.innerHTML = '';

  spread.positions.forEach((pos, i) => {
    const slot = document.createElement('div');
    slot.className = 'card-slot';

    const card = document.createElement('div');
    card.className = 'tarot-card face-down' + (i === Math.floor(spread.positions.length/2) && spread.count > 1 ? ' center-card' : '');
    card.id = 'slot-' + i;
    card.innerHTML = `<div class="card-face-down-glyph">✦</div>`;

    const label = document.createElement('div');
    label.className = 'card-pos-label';
    label.textContent = pos;

    slot.appendChild(card);
    slot.appendChild(label);
    table.appendChild(slot);
  });
}

function drawCards() {
  const spread = SPREADS[currentSpread];
  const shuffled = [...ALL_CARDS].sort(() => Math.random() - 0.5);

  // Assign positions correctly — use isReversed for the boolean flag
  drawnCards = shuffled.slice(0, spread.count).map((c, i) => ({
    ...c,
    isReversed: Math.random() < 0.3,
    position: spread.positions[i]
  }));

  // Animate card reveals
  drawnCards.forEach((card, i) => {
    setTimeout(() => {
      const slot = document.getElementById('slot-' + i);
      if (slot) {
        const isMajor = card.suit === 'major';
        const suitClass = !isMajor ? ` suit-${card.suit}` : '';
        slot.className = 'tarot-card revealed' + (isMajor ? ' major-revealed' : '') + suitClass + (i === Math.floor(spread.count/2) && spread.count > 1 ? ' center-card' : '');

              <circle cx="8" cy="52" r="1" fill="rgba(200,185,138,0.4)"/>
              <circle cx="72" cy="65" r="1" fill="rgba(200,185,138,0.3)"/>
              <circle cx="10" cy="78" r="1.5" fill="rgba(200,185,138,0.4)"/>
              <circle cx="70" cy="88" r="1" fill="rgba(200,185,138,0.3)"/>
              <circle cx="18" cy="95" r="1" fill="rgba(200,185,138,0.3)"/>

            <div class="card-aura" style="width:56px;height:56px;"></div>
            <div class="card-aura" style="width:40px;height:40px;"></div>
            <div class="card-major-corner tl"></div>
            <div class="card-major-corner tr"></div>
            <div class="card-major-corner bl"></div>
            <div class="card-major-corner br"></div>
            <div class="card-major-inner">

            </div>
            <div class="card-major-plate">
              <div class="plate-num">${card.numeral}</div>
              <div class="plate-name">${card.name}</div>
            </div>
          `;
        } else {
          slot.innerHTML = `
            ${card.isReversed ? `<div class="reversed-badge">REV</div>` : ''}
            <div class="suit-tint ${card.suit}"></div>

            <div class="card-corner-gem tl"></div>

            <div class="card-corner-gem bl"></div>
            <div class="card-corner-gem br"></div>
            <div class="card-inner">
              <div class="card-numeral">${card.numeral}</div>
              <div class="card-glyph">${card.glyph}</div>

}

async function fetchReading() {
  const output = document.getElementById('reading-output');
  const narrativeContent = document.getElementById('narrative-content');
  const cardSummaries = document.getElementById('card-summaries');

  output.classList.add('visible');

  // Card summaries
  cardSummaries.innerHTML = drawnCards.map(c => `
    <div class="card-summary">
      <div class="card-summary-name">${c.glyph} ${c.name}${c.isReversed ? ' (R)' : ''}</div>
      <div class="card-summary-pos">${c.position}</div>
      <div class="card-summary-text">${c.isReversed ? c.reversed : c.upright}</div>
    </div>
  `).join('');

  narrativeContent.innerHTML = `
    <div class="loading-indicator">
      <span>The cards speak</span>
      <div class="loading-dots"><span></span><span></span><span></span></div>
    </div>`;

  const question = document.getElementById('question-input').value.trim();
  const spread = SPREADS[currentSpread];

  const cardDescriptions = drawnCards.map((c, i) =>
    `Position: ${c.position} — Card: ${c.name}${c.isReversed ? ' (Reversed)' : ''} — Meaning: ${c.isReversed ? c.reversed : c.upright}`
  ).join('\n');

  const prompt = `You are a wise and poetic tarot reader with a mystical, literary voice. Use evocative, atmospheric language — deep but not overwrought.

Spread: ${currentSpread === 'single' ? 'Single Card' : spread.positions.join(' · ')}
${question ? `Seeker's question: "${question}"` : 'No specific question was asked — offer an open reading.'}

Cards drawn:
${cardDescriptions}

Respond in this exact format:
SUMMARY: [One evocative sentence — a poetic distillation of the reading's core message, like an epigraph. No more than 20 words.]

[Then 3–4 paragraphs of flowing narrative that synthesizes all the cards. Reference each card naturally. Contemplative, honest, slightly mysterious tone. End with a single line of quiet guidance.]

Do not include any labels, headers, or preamble other than the SUMMARY: line.`;

  try {
    const res = await fetch(PROXY_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const rawText = await res.text();
    let data;
    try {
      data = JSON.parse(rawText);
    } catch {
      narrativeContent.innerHTML = `<div class="narrative-text"><p style="color:var(--text-dim);font-size:12px;">Error: unexpected response (HTTP ${res.status}). Raw: ${rawText.slice(0,200)}</p></div>`;
      return;
    }

    if (!res.ok || data.error) {
      const msg = data.error?.message || `HTTP ${res.status}: ${res.statusText}`;
      narrativeContent.innerHTML = `<div class="narrative-text"><p style="color:var(--text-dim);font-size:12px;">API error: ${msg}</p></div>`;
      return;
    }

    const text = data.content?.[0]?.text || '';
    if (!text) {
      narrativeContent.innerHTML = `<div class="narrative-text"><p style="color:var(--text-dim);font-size:12px;">Error: empty response from API.</p></div>`;
      return;
    }

    const summaryMatch = text.match(/^SUMMARY:\s*(.+)/m);
    const summary = summaryMatch ? summaryMatch[1].trim() : '';
    const bodyText = text.replace(/^SUMMARY:.+\n*/m, '').trim();
    const paragraphs = bodyText.split('\n\n').filter(p => p.trim());
    narrativeContent.innerHTML = `<div class="narrative-text">
      ${summary ? `<div class="narrative-summary">${summary}</div>` : ''}
      <div class="narrative-body">${paragraphs.map(p => `<p>${p}</p>`).join('')}</div>
    </div>`;
  } catch(e) {
    narrativeContent.innerHTML = `<div class="narrative-text"><p style="color:var(--text-dim);font-size:12px;">Error: ${e.message}</p></div>`;
  }

  output.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function resetReading() {
  drawnCards = [];
  document.getElementById('reading-output').classList.remove('visible');
  document.getElementById('draw-btn').disabled = false;
  renderCardTable();
}

// ===== CARDS =====
function filterCards(btn, filter) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = filter;
  renderCardsGrid();
}

function renderCardsGrid() {
  const grid = document.getElementById('cards-grid');
  let cards = ALL_CARDS;
  if (currentFilter === 'major') cards = ALL_CARDS.filter(c => c.suit === 'major');
  if (currentFilter === 'minor') cards = ALL_CARDS.filter(c => c.suit !== 'major');

  grid.innerHTML = cards.map(c => {
    const isMajor = c.suit === 'major';
    let cardHTML;
    if (isMajor) {
      cardHTML = `
        <div class="gallery-card gallery-major">
          <svg style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;" viewBox="0 0 90 153" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="18" r="1" fill="rgba(200,185,138,0.45)"/>
            <circle cx="76" cy="14" r="1.5" fill="rgba(200,185,138,0.5)"/>
            <circle cx="82" cy="40" r="1" fill="rgba(200,185,138,0.3)"/>
            <circle cx="8" cy="55" r="1" fill="rgba(200,185,138,0.4)"/>
            <circle cx="80" cy="68" r="1" fill="rgba(200,185,138,0.3)"/>
            <circle cx="10" cy="82" r="1.5" fill="rgba(200,185,138,0.35)"/>
            <circle cx="78" cy="95" r="1" fill="rgba(200,185,138,0.3)"/>
            <circle cx="20" cy="100" r="1" fill="rgba(200,185,138,0.3)"/>
          </svg>
          <div style="position:absolute;width:64px;height:64px;border-radius:50%;border:1px solid rgba(200,168,75,0.12);top:calc(50% - 21px);left:50%;transform:translate(-50%,-50%);pointer-events:none;"></div>
          <div style="position:absolute;width:46px;height:46px;border-radius:50%;border:1px solid rgba(200,168,75,0.07);top:calc(50% - 21px);left:50%;transform:translate(-50%,-50%);pointer-events:none;"></div>
          <div class="card-major-corner tl"></div>
          <div class="card-major-corner tr"></div>
          <div class="card-major-corner bl" style="bottom:42px;"></div>
          <div class="card-major-corner br" style="bottom:42px;"></div>
          <div style="position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;padding-bottom:42px;height:100%;">
            <div style="font-size:34px;line-height:1;">${c.glyph}</div>
          </div>
          <div style="position:absolute;bottom:0;left:0;right:0;min-height:42px;background:rgba(4,6,12,0.96);border-top:1px solid rgba(200,168,75,0.5);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:3px 4px;">
            <div style="font-family:'Cinzel',serif;font-size:9px;color:var(--gold);letter-spacing:3px;">${c.numeral}</div>
            <div style="font-family:'Cinzel',serif;font-size:7px;color:var(--gold-pale);letter-spacing:1.5px;text-transform:uppercase;text-align:center;line-height:1.3;width:100%;">${c.name}</div>
          </div>
        </div>`;
    } else {
      cardHTML = `
        <div class="gallery-card gallery-minor suit-${c.suit}">
          <div class="suit-tint ${c.suit}"></div>
          <div class="card-minor-inner"></div>
          <div class="card-corner-gem tl"></div>
          <div class="card-corner-gem tr"></div>
          <div class="card-corner-gem bl"></div>
          <div class="card-corner-gem br"></div>
          <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:8px;text-align:center;">
            <div style="font-family:'Cinzel',serif;font-size:9px;color:var(--gold-dim);letter-spacing:2px;">${c.numeral}</div>
            <div style="font-size:26px;line-height:1;">${c.glyph}</div>
            <div style="font-family:'Cinzel',serif;font-size:7px;color:var(--text);letter-spacing:1px;line-height:1.4;text-align:center;">${c.name}</div>
          </div>
        </div>`;
    }
    return `<div class="card-library-item" onclick="openCardModal(${c.id})">${cardHTML}</div>`;
  }).join('');
}

function openCardModal(id) {
  const card = ALL_CARDS.find(c => c.id === id);
  if (!card) return;

  const isMajor = card.suit === 'major';

  const modalCardHTML = isMajor ? `
    <div style="width:110px;height:187px;border-radius:4px;background:#05080f;border:2px solid var(--gold);position:relative;overflow:hidden;flex-shrink:0;box-shadow:0 0 28px rgba(200,168,75,0.18);">
      <svg style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;" viewBox="0 0 110 187" xmlns="http://www.w3.org/2000/svg">
        <circle cx="14" cy="22" r="1.2" fill="rgba(200,185,138,0.45)"/>
        <circle cx="92" cy="16" r="1.8" fill="rgba(200,185,138,0.5)"/>
        <circle cx="100" cy="50" r="1.2" fill="rgba(200,185,138,0.3)"/>
        <circle cx="10" cy="68" r="1.2" fill="rgba(200,185,138,0.4)"/>
        <circle cx="98" cy="85" r="1.2" fill="rgba(200,185,138,0.3)"/>
        <circle cx="12" cy="102" r="1.8" fill="rgba(200,185,138,0.35)"/>
        <circle cx="96" cy="118" r="1.2" fill="rgba(200,185,138,0.3)"/>
        <circle cx="24" cy="125" r="1.2" fill="rgba(200,185,138,0.3)"/>
      </svg>
      <div style="position:absolute;width:78px;height:78px;border-radius:50%;border:1px solid rgba(200,168,75,0.12);top:calc(50% - 26px);left:50%;transform:translate(-50%,-50%);pointer-events:none;"></div>
      <div style="position:absolute;width:56px;height:56px;border-radius:50%;border:1px solid rgba(200,168,75,0.07);top:calc(50% - 26px);left:50%;transform:translate(-50%,-50%);pointer-events:none;"></div>
      <div style="position:absolute;width:18px;height:18px;top:7px;left:7px;border-top:1px solid var(--gold);border-left:1px solid var(--gold);pointer-events:none;"></div>
      <div style="position:absolute;width:18px;height:18px;top:7px;right:7px;border-top:1px solid var(--gold);border-right:1px solid var(--gold);pointer-events:none;"></div>
      <div style="position:absolute;width:18px;height:18px;bottom:52px;left:7px;border-bottom:1px solid var(--gold);border-left:1px solid var(--gold);pointer-events:none;"></div>
      <div style="position:absolute;width:18px;height:18px;bottom:52px;right:7px;border-bottom:1px solid var(--gold);border-right:1px solid var(--gold);pointer-events:none;"></div>
      <div style="position:relative;display:flex;align-items:center;justify-content:center;padding-bottom:48px;height:100%;">
        <div style="font-size:44px;line-height:1;">${card.glyph}</div>
      </div>
      <div style="position:absolute;bottom:0;left:0;right:0;min-height:48px;background:rgba(4,6,12,0.96);border-top:1px solid rgba(200,168,75,0.5);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:4px 6px;">
        <div style="font-family:'Cinzel',serif;font-size:11px;color:var(--gold);letter-spacing:3px;">${card.numeral}</div>
        <div style="font-family:'Cinzel',serif;font-size:8px;color:var(--gold-pale);letter-spacing:1.5px;text-transform:uppercase;text-align:center;line-height:1.3;width:100%;">${card.name}</div>
      </div>
    </div>` : `
    <div style="width:110px;height:187px;border-radius:4px;background:#09090b;border:1px solid #2a2a2e;position:relative;overflow:hidden;flex-shrink:0;">
      <div class="suit-tint ${card.suit}" style="border-radius:4px;"></div>
      <div style="position:absolute;inset:6px;border:1px solid rgba(200,168,75,0.18);border-radius:2px;pointer-events:none;"></div>
      <div style="position:absolute;width:7px;height:7px;background:var(--gold-dim);transform:rotate(45deg);top:8px;left:8px;"></div>
      <div style="position:absolute;width:7px;height:7px;background:var(--gold-dim);transform:rotate(45deg);top:8px;right:8px;"></div>
      <div style="position:absolute;width:7px;height:7px;background:var(--gold-dim);transform:rotate(45deg);bottom:8px;left:8px;"></div>
      <div style="position:absolute;width:7px;height:7px;background:var(--gold-dim);transform:rotate(45deg);bottom:8px;right:8px;"></div>
      <div style="position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:12px;height:100%;text-align:center;">
        <div style="font-family:'Cinzel',serif;font-size:11px;color:var(--gold-dim);letter-spacing:2px;">${card.numeral}</div>
        <div style="font-size:36px;line-height:1;">${card.glyph}</div>
        <div style="font-family:'Cinzel',serif;font-size:8px;color:var(--text);letter-spacing:1px;line-height:1.4;">${card.name}</div>
      </div>
    </div>`;

  document.getElementById('modal-content').innerHTML = `
    <div class="modal-card-top">
      ${modalCardHTML}
      <div class="modal-meta">
        <h2>${card.name}</h2>
        <div class="modal-type">${isMajor ? 'Major Arcana' : `Minor Arcana · ${card.suit.charAt(0).toUpperCase() + card.suit.slice(1)}`}</div>
        ${card.keywords.length ? `<div class="keyword-pills">${card.keywords.map(k => `<div class="keyword-pill">${k}</div>`).join('')}</div>` : ''}
        ${isMajor ? `<div class="modal-section"><p style="font-size:12px;">${card.meaning}</p></div>` : ''}

    <div class="modal-section">
      <h4>Reversed</h4>
      <p>${card.reversed}</p>
    </div>
  `;
  document.getElementById('card-modal').classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('card-modal')) {
    document.getElementById('card-modal').classList.remove('open');
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.getElementById('card-modal').classList.remove('open');
});

// ===== INIT =====
initStars();
renderCardTable();
renderCardsGrid();
</script>
</body>
</html>
